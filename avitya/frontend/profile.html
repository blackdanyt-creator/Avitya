<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Avitya</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
      <div class="container">
        <div class="header__wrapper">
          <a href="index.html" class="header__logo-link">
            <svg
              class="header__logo"
              width="109"
              height="30"
              aria-hidden="true"
            >
              <use xlink:href="img/sprite.svg#header-logo"></use>
            </svg>
          </a>
          <div class="header__middle">
            <button class="header__middle-btn" type="button">
              <svg
                class="header__middle-btn-icon"
                width="20"
                height="20"
                aria-hidden="true"
              >
                <use xlink:href="img/sprite.svg#category-icon"></use>
              </svg>
              <span class="header__middle-btn-text"> Все категории </span>
            </button>
            <div class="header__middle-search">
              <input
                class="header__middle-search-field"
                type="search"
                placeholder="Поиск по объявлениям"
                maxlength="100"
              />

              <button class="header__middle-search-btn" type="button">
                Найти
              </button>
              <a class="header__middle-create" href="add-edit.html">Создать объявление</a>
            </div>
          </div>
        </div>
      </div>
    </header>

                  <img
                    src="./img/categories-imgs/landlord.png"
                    alt="Недвижимость"
                    class="categories-menu__list-item-link-left-image"
                    width="28"
                    height="22"
                  />
                  <span class="categories-menu__list-item-link-left-text"
                    >Недвижимость</span
                  >
                </div>
                <div class="categories-menu__list-item-link-right">
                  <svg
                    class="categories-menu__list-item-link-right-icon"
                    width="20"
                    height="20"
                    aria-hidden="true"
                  >
                    <use xlink:href="img/sprite.svg#icon-burger-arrow"></use>
                  </svg>
                </div>
              </a>
            </li>

                    height="20"

                </div>
              </a>
            </li>
            <li class="categories-menu__list-item">

                href="category.html?category=Хобби и отдых"

              >
                <div class="categories-menu__list-item-link-left">
                  <img
                    src="./img/categories-imgs/hobby.png"

                    height="22"
                  />

        </div>
      </div>
    </div>

    <main class="profile">
        <div class="container">
            <div class="profile__header">
                <div class="avatar" id="avatar">A</div>
                <h1 id="profile-nickname">Никнейм</h1>
                <p id="profile-email" class="profile__email"></p>
                <p id="profile-city" class="profile__city"></p>
                <button class="logout-btn" id="logout-btn">Выйти из аккаунта</button>
            </div>

            <div class="tabs">
                <button data-tab="my-ads">Мои объявления</button>
                <button data-tab="favorites">Избранное</button>
                <button data-tab="chat">Чат</button>
                <button data-tab="settings">Настройки</button>
            </div>

            <div id="tab-my-ads" class="tab-content">
                <ul id="my-ads-list" class="ads__grid-list"></ul>
            </div>

            <div id="tab-favorites" class="tab-content">
                <ul id="favorites-list" class="ads__grid-list"></ul>
            </div>

            <div id="tab-chat" class="tab-content">
                <p>Откройте вкладку, чтобы загрузить чат</p>
            </div>

            <div id="tab-settings" class="tab-content">
                <h2>Настройки профиля</h2>
                <form id="settings-form">
                    <label>Никнейм</label>
                    <input type="text" id="set-nickname" required>

                    <label>Email</label>
                    <input type="email" id="set-email" required>

                    <label>Город</label>
                    <input type="text" id="set-city">

                    <label>Новый пароль <span></span></label>
                    <input type="password" id="set-password" minlength="6" placeholder="Минимум 6 символов">

                    <p id="settings-status"></p>

                    <button type="submit">Сохранить изменения</button>
                </form>
            </div>
        </div>
    </main>

    <script src="./js/main.js" type="module"></script>
    <script src="./js/profile.js" type="module"></script>
</body>
</html>
